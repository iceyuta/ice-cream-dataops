# これは途中まで書かれています。以下のコードを参考に、ファイルを完成させてください。
workflowExternalId: wf_icapi_data_pipeline
version: '1'
workflowDefinition:
  description: Ice Cream API データパイプライン
  tasks:
    # 1) アセット階層の構築（Transformation・先頭なので dependsOn なし）
    - externalId: create_asset_hierarchy_task
      type: transformation
      parameters:
        transformation:
          externalId: create_asset_hierarchy
          concurrencyPolicy: fail
      retries: 3
      timeout: 3600
      onFailure: abortWorkflow

    # 2) 時系列⇔アセットのコンテキスト化（Function）
    - externalId: contextualize_ts_assets_task
      type: function
      parameters:
        function:
          externalId: contextualize_ts_assets
          data: {}
      retries: 3
      timeout: 3600
      onFailure: abortWorkflow
      dependsOn:
        - externalId: create_asset_hierarchy_task

    # 3) データポイント抽出（Function）
    - externalId: icapi_datapoints_extractor_task
      type: function
      parameters:
        function:
          externalId: icapi_datapoints_extractor
          data: { "hours": 1 }
      retries: 3
      timeout: 3600
      onFailure: abortWorkflow
      dependsOn:
        - externalId: contextualize_ts_assets_task

    # 4) OEE 時系列の算出（Transformation）
    - externalId: oee_timeseries_task
      type: transformation
      parameters:
        transformation:
          externalId: oee_timeseries
          concurrencyPolicy: fail
      retries: 3
      timeout: 3600
      onFailure: abortWorkflow
      dependsOn:
        - externalId: icapi_datapoints_extractor_task